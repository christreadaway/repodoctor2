[build]
  command = "npm install"
  publish = "static"

[build.environment]
  NODE_VERSION = "18"

[functions]
  directory = "netlify/functions"
  node_bundler = "nft"
  included_files = ["netlify/functions/api/views/**"]

# Static assets served directly from CDN
[[redirects]]
  from = "/static/*"
  to = "/static/:splat"
  status = 200

# All other requests route to the Express serverless function
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true
