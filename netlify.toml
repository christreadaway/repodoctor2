[build]
  command = "bash netlify_build.sh"
  publish = "dist"
  functions = "netlify_functions"

[build.environment]
  PYTHON_VERSION = "3.11"

# Serve static assets directly from CDN (files in dist/static/)
[[redirects]]
  from = "/static/*"
  to = "/static/:splat"
  status = 200

# Route all other requests to the Flask serverless function
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true
