[build]
  command = "npm install && mkdir -p dist/static && cp -r static/css dist/static/ && cp -r static/js dist/static/"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

[functions]
  directory = "netlify/functions"
  node_bundler = "nft"
  included_files = ["netlify/functions/api/views/**"]

[functions."api"]
  external_node_modules = []
  # NOTE: function timeout is NOT configurable from netlify.toml — it's a
  # plan/UI setting (10s free, 26s paid). The /scan batching assumes 26s;
  # on the free plan, large accounts may need multiple scan clicks.

# Static assets served directly from CDN (matched first, no force needed)
[[redirects]]
  from = "/static/*"
  to = "/static/:splat"
  status = 200

# All other requests (GET + POST) route to the Express serverless function
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true
