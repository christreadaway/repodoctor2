[build]
  command = "npm install && mkdir -p dist/static && cp -r static/css dist/static/ && cp -r static/js dist/static/"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

[functions]
  directory = "netlify/functions"
  node_bundler = "nft"
  included_files = ["netlify/functions/api/views/**"]

# All non-static requests route to the Express serverless function
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
